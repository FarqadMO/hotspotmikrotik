<style>
@keyframes flowRed1 {
  0%   { stroke-dashoffset: 0; }
  100% { stroke-dashoffset: -300; }
}
@keyframes flowRed2 {
  0%   { stroke-dashoffset: 0; }
  100% { stroke-dashoffset: -300; }
}
@keyframes pulseCircle1 {
  0%, 100% { opacity: 1; r: 5.333; }
  50%       { opacity: 0.5; r: 7; }
}
@keyframes pulseCircle2 {
  0%, 100% { opacity: 1; r: 5.333; }
  50%       { opacity: 0.5; r: 7; }
}
.flow-line-1 {
  stroke-dasharray: 16 12;
  animation: flowRed1 4.5s linear infinite;
}
.flow-line-2 {
  stroke-dasharray: 16 12;
  animation: flowRed2 5.5s linear infinite reverse;
}
.pulse-1 { animation: pulseCircle1 3.5s ease-in-out infinite; }
.pulse-2 { animation: pulseCircle2 3.5s ease-in-out infinite 0.8s; }
.glow-1 { filter: drop-shadow(0 0 4px #D91137) drop-shadow(0 0 10px rgba(217,17,55,0.6)); }
.glow-2 { filter: drop-shadow(0 0 4px #D91137) drop-shadow(0 0 10px rgba(217,17,55,0.6)); }
</style>

